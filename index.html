<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ezura Technologies</title>
    <link rel="stylesheet" href="style.css">

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

</head>
<body>

<!-- Navigation -->
<nav class="navbar">
    <div class="container">
        <!-- Logo -->
        <a href="index.html" class="nav-logo">Ezura</a>

        <!-- Links as buttons -->
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="projects.html">Projects</a>
            <a href="approach.html">Approach</a>
            <a href="founder.html">Founder</a>
            <a href="contact.html">Contact</a>
        </div>
    </div>
</nav>
<!-- Hero Section -->
<section class="hero">
    <div class="container">
        <h1>Ezura Technologies — Where Impactful Digital Products Come to Life</h1>
        <p>Building apps that solve real-world problems today and shape the tech landscape of tomorrow.</p>
        <a href="projects.html" class="btn">Explore Our Projects</a>
    </div>
</section>

<script>
const navLinks = document.querySelectorAll('.nav-links a');
const path = window.location.pathname;
const page = path.substring(path.lastIndexOf("/") + 1) || "index.html";

navLinks.forEach(link => {
    if(link.getAttribute('href') === page) {
        link.classList.add('active');
    }
});
</script>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const fadeElements = document.querySelectorAll('.fade-in');

    const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
            if(entry.isIntersecting) {
                entry.target.classList.add('visible');
            }
        });
    }, { threshold: 0.1 });

    fadeElements.forEach(el => observer.observe(el));
});
</script>


</body>
</html>
