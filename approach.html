<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ezura Approach</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navigation -->
<nav class="navbar">
    <div class="container">
        <!-- Logo -->
        <a href="index.html" class="nav-logo">Ezura</a>

        <!-- Links as buttons -->
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="projects.html">Projects</a>
            <a href="approach.html">Approach</a>
            <a href="founder.html">Founder</a>
        </div>
    </div>
</nav>

<section class="approach">
    <div class="container">
        <h2>Our Approach</h2>
        <ul>
            <li>Transparent development process</li>
            <li>Founder-led accountability</li>
            <li>Long-term vision & innovation</li>
            <li>Product-first, proof through execution</li>
        </ul>
    </div>
</section>

<script>
const navLinks = document.querySelectorAll('.nav-links a');
const path = window.location.pathname;
const page = path.substring(path.lastIndexOf("/") + 1) || "index.html";

navLinks.forEach(link => {
    if(link.getAttribute('href') === page) {
        link.classList.add('active');
    }
});
</script>

</body>
</html>
